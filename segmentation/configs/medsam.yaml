# MedSAM3 Integration Configuration — ISIC 2018 Task 1

mode: "zero_shot"

model:
  display_name: "MedSAM3"
  backbone: "SAM3 + MedSAM3 LoRA v1"
  run_id_prefix: "medsam3"
  repo_url: "https://github.com/Joey-S-Liu/MedSAM3"
  repo_path: "external/MedSAM3"
  config_path: "configs/full_lora_config.yaml"
  weights_path: "weights/medsam3_v1/best_lora_weights.pt"
  base_checkpoint_path: null
  load_from_hf: true
  resolution: 1008
  detection_threshold: 0.5
  nms_iou_threshold: 0.5
  mask_threshold: 0.5

prompting:
  strategy: "text"
  text_prompts:
    - "skin lesion"
    - "lesion"
  default_prompt: "lesion"

inference:
  output_dir: "artifacts/medsam3/predictions"
  batch_size: 1
